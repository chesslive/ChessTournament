<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Spelling Bee Pro | Deluxe Mobile</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- ALL REACTIVE THEMES --- */
        .bg-default { 
            background: #0f172a; 
            color: #f8fafc; 
        }

        .bg-ocean { 
            background: linear-gradient(135deg, #075985, #1e3a8a); 
            color: white; 
        }

        .bg-neon { 
            background: #000; 
            color: #00ff41; 
            text-shadow: 0 0 8px #00ff41; 
        }

        .bg-galaxy { 
            background: radial-gradient(circle at 30% 30%, #2e1065, #000000, #0f172a);
            background-size: 200% 200%;
            color: #f0e68c;
            text-shadow: 0 0 10px #c084fc;
        }
        
        /* Chess: Grandmaster Checkers */
        .bg-chess { 
            background-color: #ffffff;
            background-image: repeating-conic-gradient(#2c2c2c 0% 25%, #ffffff 0% 50%);
            background-position: 0 0, 30px 30px;
            background-size: 60px 60px;
            color: #000;
        }

        /* Roblox: Red/Dark with brick pattern */
        .bg-roblox { 
            background: #202225 repeating-linear-gradient(45deg, rgba(255,0,0,0.2) 0px, rgba(255,0,0,0.2) 20px, transparent 20px, transparent 40px);
            border-top: 10px solid #f63131; 
            color: white; 
            text-shadow: 2px 2px 0 #000;
        }

        /* Fortnite: Storm with lightning bolts */
        .bg-fortnite { 
            background: linear-gradient(135deg, #1a0b2e 0%, #2a1b4a 50%, #0b3b5c 100%);
            position: relative;
            color: #a0e7ff;
            text-shadow: 0 0 8px #0077ff;
        }
        .bg-fortnite::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        /* Lilly Love Braids (Poppy Playtime style) - Now using CSS pattern */
        .bg-secret { 
            background-color: #f8c8dc;
            background-image: 
                radial-gradient(circle at 20% 30%, #ffb6c1 5%, transparent 5%),
                radial-gradient(circle at 80% 70%, #ffb6c1 5%, transparent 5%),
                repeating-linear-gradient(45deg, transparent, transparent 10px, #ff99aa 10px, #ff99aa 20px);
            color: #4a1a2c;
            text-shadow: 2px 2px 5px #fff2f5;
        }

        /* New themes */
        .bg-midnight {
            background: #0a0f1e;
            color: #cbd5e1;
            box-shadow: inset 0 0 100px #2563eb20;
        }
        .bg-sunset {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #2d1b0e;
        }
        .bg-forest {
            background: #0b3b2f repeating-linear-gradient(45deg, #2e7d5e 0px, #2e7d5e 2px, transparent 2px, transparent 12px);
            color: #e7f5e7;
        }
        .bg-oceandeep {
            background: linear-gradient(145deg, #006994, #001f3f);
            color: #b3e0ff;
        }
        .bg-cyber {
            background: #0d0f1a repeating-linear-gradient(45deg, #00ffff10 0px, #00ffff10 20px, #ff00ff10 20px, #ff00ff10 40px);
            color: #ffb3ff;
            text-shadow: 0 0 5px cyan;
        }
        .bg-pastel {
            background: linear-gradient(135deg, #fbc2c2, #c2f0fc);
            color: #4a4a4a;
        }
        .bg-dark {
            background: #121212;
            color: #e0e0e0;
        }
        .bg-light {
            background: #f5f5f5;
            color: #1e1e1e;
        }
        .bg-candy {
            background: repeating-linear-gradient(45deg, #ffb6c1, #ffb6c1 20px, #ffe4e1 20px, #ffe4e1 40px);
            color: #8b4513;
        }
        .bg-lavender {
            background: linear-gradient(145deg, #e6e6fa, #d8bfd8);
            color: #2d2d4a;
        }

        body { 
            margin: 0; 
            padding: 15px; 
            transition: background 0.6s ease, color 0.6s ease; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            font-size: 16px; /* base for rem */
        }

        .container { 
            width: 100%; 
            max-width: 800px; /* wider for smart boards */
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            padding: 20px; 
            border-radius: 32px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { 
            from { 
                opacity: 0; 
                transform: translateY(10px); 
            } 
            to { 
                opacity: 1; 
                transform: translateY(0); 
            } 
        }

        .hidden { 
            display: none !important; 
        }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        input, select, button {
            font-size: 1rem;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            background: rgba(0,0,0,0.6); 
        }

        button { 
            background: var(--primary); 
            cursor: pointer; 
            font-weight: 700; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            min-width: 48px; /* touch target */
            min-height: 48px;
        }

        button:active { 
            transform: scale(0.96); 
        }

        button:disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
        }

        .big-btn { 
            width: 100%; 
            font-size: 1.3rem; 
            background: var(--success); 
            margin-bottom: 10px; 
            padding: 18px; 
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }
        
        .action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .action-row input {
            flex: 2;
            min-width: 200px;
        }
        .action-row button {
            flex: 1;
            min-width: 80px;
        }
        
        section { 
            margin-bottom: 20px; 
            padding: 20px; 
            border-radius: 24px; 
            background: rgba(255,255,255,0.06);
        }

        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 12px; 
        }

        .shop-grid button { 
            padding: 14px 6px; 
            font-size: 0.9rem; 
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            white-space: normal;
            line-height: 1.2;
        }

        .msg { 
            font-weight: 700; 
            margin-top: 12px; 
            text-align: center; 
            min-height: 1.5em; 
            font-size: 1rem; 
        }

        .badge { 
            background: var(--secondary); 
            padding: 5px 12px; 
            border-radius: 10px; 
            font-size: 0.75rem; 
            font-weight: 900; 
        }
        
        #deck-info { 
            font-size: 0.8rem; 
            opacity: 0.6; 
            text-align: center; 
            margin-top: 8px; 
            letter-spacing: 0.5px; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
        }

        td { 
            padding: 12px 8px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.95rem;
        }
        
        .voice-selector {
            margin-bottom: 15px;
        }
        .voice-selector select {
            width: 100%;
            padding: 14px;
        }

        /* Larger screens (smart boards) */
        @media (min-width: 768px) {
            body { padding: 30px; }
            .container { padding: 35px; }
            button { padding: 16px 24px; }
            .big-btn { font-size: 1.6rem; }
            .shop-grid button { font-size: 1rem; }
        }
    </style>
</head>
<body class="bg-default" id="main-body">

    <div id="login-screen" class="container">
        <h1 style="margin:0; font-size: clamp(2rem, 8vw, 2.8rem); text-align: center;">🎙️ Spelling Bee</h1>
        <p style="opacity:0.7; margin-bottom: 30px; text-align: center; font-size: 1.1rem;">The ultimate arena for words.</p>
        
        <div style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="username-input" placeholder="Enter Username" autocomplete="off">
            
            <div id="password-area" class="hidden">
                <p id="pw-label" style="font-size:0.9rem; margin: 5px 0; color:var(--secondary); font-weight:bold;"></p>
                <input type="password" id="password-input" placeholder="Password">
            </div>

            <button id="login-btn" style="margin-top: 10px;">Join Match</button>
        </div>
        <p id="login-msg" class="msg" style="color: var(--danger);"></p>
    </div>

    <div id="app-screen" class="container hidden">
        <header>
            <div>
                <h2 id="welcome-text" style="margin:0; font-size: 1.4rem;">Welcome</h2>
                <span class="badge" id="role-badge">STUDENT</span>
            </div>
            <div style="text-align:right">
                <div style="font-size:2rem; font-weight:900; color:var(--success)" id="points-display">0</div>
                <div style="font-size:0.7rem; opacity:0.7; letter-spacing: 1.5px;">TOTAL SCORE</div>
            </div>
        </header>

        <section id="admin-panel" class="hidden" style="border-left: 5px solid var(--secondary)">
            <h3 style="margin-top:0; color: var(--secondary); display: flex; align-items: center; gap: 8px;">
                <span>🛠️ Admin Terminal</span>
            </h3>
            
            <div style="display:flex; gap:10px; margin-bottom: 15px; flex-wrap: wrap;">
                <input type="text" id="new-word-input" placeholder="New Vocabulary Word" style="flex:2;">
                <button id="add-word-btn" style="background:var(--secondary); flex:1;">Add</button>
            </div>

            <button id="toggle-word-list-btn" style="width:100%; background:rgba(255,255,255,0.1); font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.2);">
                👁️ Manage Database (Quiz Lock)
            </button>

            <div id="word-list-admin" class="hidden" style="margin-top: 20px; max-height: 250px; overflow-y: auto; padding-right: 5px;">
            </div>
            <hr style="margin:20px 0; opacity:0.2">

            <h4 style="margin:0 0 10px 0;">👑 Admin Manager</h4>
            <div style="display:flex; gap:10px; flex-wrap: wrap;">
                <input type="text" id="admin-target" placeholder="Username" style="flex: 2 1 120px;">
                <input type="password" id="admin-password" placeholder="New Password" style="flex: 2 1 120px;">
                <button id="make-admin-btn" style="background:var(--success); flex:1;">Make Admin</button>
                <button id="remove-admin-btn" style="background:var(--danger); flex:1;">Remove Admin</button>
            </div>
            <p id="admin-msg" class="msg"></p>
        </section>

        <section id="quiz-area">
            <!-- Voice selector -->
            <div class="voice-selector">
                <select id="voice-select">
                    <option value="">Loading voices...</option>
                </select>
            </div>

            <button id="play-word-btn" class="big-btn">🔊 Hear Word</button>
            
            <div class="action-row">
                <input type="text" id="spell-input" placeholder="Spell it here..." autocomplete="off" autocapitalize="off" spellcheck="false">
                <button id="submit-spell-btn">Check</button>
            </div>
            
            <div class="action-row">
                <button id="skip-word-btn" style="background:var(--warning);">⏭️ Skip (10 pts)</button>
            </div>

            <p id="game-msg" class="msg"></p>
            <div id="deck-info">Loading words...</div>
        </section>

        <section style="padding: 15px;">
            <h3 style="margin: 10px; font-size: 1.1rem; opacity: 0.8;">🏆 Hall of Fame</h3>
            <table>
                <tbody id="leaderboard-body"></tbody>
            </table>
            <p id="leaderboard-error" class="msg" style="color:var(--danger); font-size:0.9rem;"></p>
        </section>

        <section>
            <h3 style="margin-top:0; font-size: 1.1rem; opacity: 0.8;">🛒 Themes & Skins</h3>
            <div class="shop-grid" id="themes-grid">
                <!-- Populated by JS with all themes -->
            </div>
        </section>

        <button onclick="location.reload()" style="width:100%; margin-top:15px; background:transparent; color: var(--danger); font-size: 0.95rem; border: 1.5px solid var(--danger); font-weight: 800; padding: 16px;">LOGOUT SESSION</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtCy-YbS2LC_cF5LlWRHXqa7SD-Rn5E6k",
            authDomain: "spelling-bee-f845d.firebaseapp.com",
            projectId: "spelling-bee-f845d",
            storageBucket: "spelling-bee-f845d.appspot.com",
            messagingSenderId: "465817747027",
            appId: "1:465817747027:web:931e7cc47636d0b77590a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let wordsList = []; // Master list
        let wordDeck = [];  // Current pool (Smart Deck)
        let currentWord = "";
        let isAdmin = false;
        let selectedVoiceURI = null; // Store preferred voice URI
        let voices = [];

        // --- All available themes with costs and display names ---
        const allThemes = [
            { className: 'bg-default', name: 'Default', cost: 0 },
            { className: 'bg-chess', name: 'Chess', cost: 20 },
            { className: 'bg-roblox', name: 'Roblox', cost: 40 },
            { className: 'bg-fortnite', name: 'Fortnite', cost: 60 },
            { className: 'bg-galaxy', name: 'Galaxy', cost: 100 },
            { className: 'bg-secret', name: 'Lilly Love Braids', cost: 0, secret: true },
            { className: 'bg-midnight', name: 'Midnight', cost: 30 },
            { className: 'bg-sunset', name: 'Sunset', cost: 30 },
            { className: 'bg-forest', name: 'Forest', cost: 35 },
            { className: 'bg-oceandeep', name: 'Ocean Deep', cost: 45 },
            { className: 'bg-cyber', name: 'Neon Cyber', cost: 55 },
            { className: 'bg-pastel', name: 'Pastel', cost: 25 },
            { className: 'bg-dark', name: 'Dark Mode', cost: 15 },
            { className: 'bg-light', name: 'Light Mode', cost: 15 },
            { className: 'bg-candy', name: 'Candy Land', cost: 40 },
            { className: 'bg-lavender', name: 'Lavender', cost: 30 }
        ];

        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const userIn = document.getElementById('username-input');
        const passArea = document.getElementById('password-area');
        const passIn = document.getElementById('password-input');
        const pwLabel = document.getElementById('pw-label');
        const voiceSelect = document.getElementById('voice-select');

        // --- Populate voice selector ---
        function populateVoices() {
            voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            if (voices.length === 0) {
                voiceSelect.innerHTML = '<option value="">No voices available</option>';
                return;
            }
            voices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.voiceURI;
                opt.textContent = `${v.name} (${v.lang})`;
                voiceSelect.appendChild(opt);
            });
            // Restore previously selected voice if exists
            if (selectedVoiceURI) {
                voiceSelect.value = selectedVoiceURI;
            } else if (currentUser && currentUser.preferredVoice) {
                voiceSelect.value = currentUser.preferredVoice;
                selectedVoiceURI = currentUser.preferredVoice;
            }
        }
        window.speechSynthesis.onvoiceschanged = populateVoices;
        // Initial call in case already loaded
        if (window.speechSynthesis.getVoices().length) populateVoices();

        // Save voice preference when changed
        voiceSelect.addEventListener('change', async () => {
            selectedVoiceURI = voiceSelect.value;
            if (currentUser) {
                currentUser.preferredVoice = selectedVoiceURI;
                await updateDoc(doc(db, "users", currentUser.id), { preferredVoice: selectedVoiceURI });
            }
        });

        // --- Speak function using selected voice ---
        function speakWord(word) {
            if (!word) return;
            const utter = new SpeechSynthesisUtterance(word);
            utter.rate = 0.8;
            if (selectedVoiceURI) {
                const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                if (voice) utter.voice = voice;
            }
            window.speechSynthesis.speak(utter);
        }

        // Debounce timer for username check
        let usernameCheckTimeout;

        userIn.addEventListener('input', () => {
            clearTimeout(usernameCheckTimeout);
            const val = userIn.value.trim().toLowerCase();
            
            if (val === "") {
                passArea.classList.add('hidden');
                return;
            }

            if (val === "abdullah") {
                passArea.classList.remove('hidden');
                pwLabel.innerText = "Admin Login:";
                return;
            }

            usernameCheckTimeout = setTimeout(async () => {
                const userRef = doc(db, "users", val);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists() && userSnap.data().password) {
                    passArea.classList.remove('hidden');
                    pwLabel.innerText = `Password for ${val}:`;
                } else {
                    passArea.classList.add('hidden');
                }
            }, 500);
        });

        // Login Logic
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = userIn.value.trim().toLowerCase();
            
            if (!username) {
                document.getElementById('login-msg').innerText = "Enter a username.";
                return;
            }

            const userRef = doc(db, "users", username);
            const userSnap = await getDoc(userRef);

            if (username === "abdullah") {
                const pw = passIn.value.trim();
                if (!pw) {
                    document.getElementById('login-msg').innerText = "Password required.";
                    return;
                }
                
                if (userSnap.exists() && userSnap.data().password) {
                    if (userSnap.data().password !== pw) {
                        document.getElementById('login-msg').innerText = "Access Denied: Wrong Password";
                        return;
                    }
                    currentUser = { id: username, ...userSnap.data() };
                } else {
                    currentUser = { id: username, points: 0, unlockedThemes: ["bg-default"], password: pw, isAdmin: true };
                    await setDoc(userRef, currentUser);
                }
                isAdmin = true;
            } else {
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    if (userData.password) {
                        const pw = passIn.value.trim();
                        if (!pw) {
                            document.getElementById('login-msg').innerText = "Password required.";
                            return;
                        }
                        if (userData.password !== pw) {
                            document.getElementById('login-msg').innerText = "Incorrect password.";
                            return;
                        }
                    }
                    currentUser = { id: username, ...userData };
                } else {
                    currentUser = { id: username, points: 0, unlockedThemes: ["bg-default"], isAdmin: false };
                    await setDoc(userRef, currentUser);
                }
                isAdmin = currentUser.isAdmin || false;
            }

            // Ensure unlockedThemes is an array
            if (!currentUser.unlockedThemes) currentUser.unlockedThemes = ["bg-default"];

            // Secret theme for special users
            if (["marina", "layla"].includes(username) && !currentUser.unlockedThemes.includes("bg-secret")) {
                currentUser.unlockedThemes.push("bg-secret");
                await updateDoc(userRef, { unlockedThemes: currentUser.unlockedThemes });
            }

            // Set preferred voice if exists
            if (currentUser.preferredVoice) {
                selectedVoiceURI = currentUser.preferredVoice;
                if (voiceSelect) voiceSelect.value = selectedVoiceURI;
            }

            setupApp();
        });

        function setupApp() {
            loginScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            
            document.getElementById('welcome-text').innerText = "Hello, " + currentUser.id.charAt(0).toUpperCase() + currentUser.id.slice(1);
            document.getElementById('points-display').innerText = currentUser.points || 0;
            
            if (isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('role-badge').innerText = "MASTER ADMIN";
                refreshAdminWords();
            } else {
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('role-badge').innerText = "STUDENT";
            }

            // Populate shop grid
            renderShop();

            fetchWords();
            setupLeaderboard();
        }

        function renderShop() {
            const grid = document.getElementById('themes-grid');
            grid.innerHTML = '';
            allThemes.forEach(theme => {
                // Skip secret theme if not unlocked and not special
                if (theme.secret && !currentUser.unlockedThemes.includes(theme.className)) return;
                
                const btn = document.createElement('button');
                btn.className = 'buy-btn';
                btn.dataset.theme = theme.className;
                btn.dataset.cost = theme.cost;
                btn.textContent = `${theme.name} (${theme.cost})`;
                if (currentUser.unlockedThemes.includes(theme.className)) {
                    btn.style.background = 'var(--success)';
                }
                btn.addEventListener('click', async (e) => {
                    const t = e.target.dataset.theme;
                    const cost = parseInt(e.target.dataset.cost);
                    
                    if (currentUser.unlockedThemes.includes(t)) {
                        document.getElementById('main-body').className = t;
                    } else if (currentUser.points >= cost) {
                        currentUser.points -= cost;
                        currentUser.unlockedThemes.push(t);
                        
                        document.getElementById('points-display').innerText = currentUser.points;
                        document.getElementById('main-body').className = t;
                        
                        await updateDoc(doc(db, "users", currentUser.id), { 
                            points: currentUser.points, 
                            unlockedThemes: currentUser.unlockedThemes 
                        });
                        renderShop(); // refresh button colors
                    } else { 
                        alert("Victory requires more points! Keep spelling."); 
                    }
                });
                grid.appendChild(btn);
            });
        }

        async function fetchWords() {
            const snapshot = await getDocs(collection(db, "words"));
            wordsList = snapshot.docs.map(doc => doc.data().word);
            wordDeck = [...wordsList]; 
            updateDeckInfo();
        }

        function updateDeckInfo() {
            const info = document.getElementById('deck-info');
            if (wordsList.length === 0) {
                info.innerText = "No words in arena database.";
            } else {
                info.innerText = `${wordDeck.length} words remaining in current cycle`;
            }
        }

        // --- SMART DECK LOGIC: REPEAT UNTIL CORRECT ---
        document.getElementById('play-word-btn').addEventListener('click', () => {
            if (!wordsList.length) { 
                document.getElementById('game-msg').innerText = "Database is empty!"; 
                return; 
            }
            
            // If no current word, pick one
            if (!currentWord) {
                if (wordDeck.length === 0) {
                    wordDeck = [...wordsList]; // Refill deck
                    document.getElementById('game-msg').innerText = "♻️ Word pool reshuffled!";
                    document.getElementById('game-msg').style.color = "var(--secondary)";
                }
                const randomIndex = Math.floor(Math.random() * wordDeck.length);
                currentWord = wordDeck.splice(randomIndex, 1)[0];
            }
            
            speakWord(currentWord);
            
            if (!document.getElementById('game-msg').innerText.includes("♻️")) {
                document.getElementById('game-msg').innerText = "Listening...";
                document.getElementById('game-msg').style.color = "white";
            }
            
            updateDeckInfo();
        });

        document.getElementById('submit-spell-btn').addEventListener('click', async () => {
            const input = document.getElementById('spell-input');
            const attempt = input.value.trim().toLowerCase();
            const msg = document.getElementById('game-msg');

            if (!currentWord) {
                msg.innerText = "Hear a word first!";
                return;
            }

            if (attempt === currentWord) {
                // Correct!
                currentUser.points = (currentUser.points || 0) + 10;
                document.getElementById('points-display').innerText = currentUser.points;
                
                msg.innerText = "🔥 Correct! +10 Points";
                msg.style.color = "var(--success)";
                
                await updateDoc(doc(db, "users", currentUser.id), { points: currentUser.points });
                
                input.value = "";
                currentWord = ""; // Clear so next hear picks new word
            } else {
                msg.innerText = "❌ Incorrect. Try hearing it again!";
                msg.style.color = "var(--danger)";
                // Word remains, so they can press Hear again
            }
        });

        // --- Skip button: costs 10 points, removes current word from deck and picks new ---
        document.getElementById('skip-word-btn').addEventListener('click', async () => {
            if (!currentWord) {
                document.getElementById('game-msg').innerText = "No word to skip.";
                return;
            }
            if (currentUser.points < 10) {
                document.getElementById('game-msg').innerText = "Not enough points (need 10).";
                return;
            }

            // Deduct points
            currentUser.points -= 10;
            document.getElementById('points-display').innerText = currentUser.points;
            await updateDoc(doc(db, "users", currentUser.id), { points: currentUser.points });

            // Current word is already removed from deck when it was drawn, so we don't need to remove again.
            // But we need to reset currentWord so next hear picks new.
            currentWord = "";
            
            document.getElementById('game-msg').innerText = "⏩ Skipped! -10 points";
            document.getElementById('game-msg').style.color = "var(--warning)";
            document.getElementById('spell-input').value = "";
            
            // Optionally, if deck empty, refill? The next hear will handle.
        });

        // --- ADMIN STUFF ---
        document.getElementById('toggle-word-list-btn').addEventListener('click', () => {
            const list = document.getElementById('word-list-admin');
            const quiz = document.getElementById('quiz-area');
            const btn = document.getElementById('toggle-word-list-btn');

            if (list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                quiz.style.opacity = "0.2";
                quiz.querySelectorAll('button, input, select').forEach(el => el.disabled = true);
                btn.innerText = "🙈 Hide Data (Unlock Quiz)";
                refreshAdminWords();
            } else {
                list.classList.add('hidden');
                quiz.style.opacity = "1";
                quiz.querySelectorAll('button, input, select').forEach(el => el.disabled = false);
                btn.innerText = "👁️ Manage Database (Quiz Lock)";
            }
        });

        async function refreshAdminWords() {
            const snap = await getDocs(collection(db, "words"));
            const div = document.getElementById('word-list-admin');
            div.innerHTML = "";
            
            snap.forEach(d => {
                const item = document.createElement('div');
                item.style = "display:flex; justify-content:space-between; align-items:center; padding:12px; background:rgba(0,0,0,0.3); border-radius:12px; margin-bottom:8px; border:1px solid rgba(255,255,255,0.05);";
                item.innerHTML = `<span>${d.data().word}</span><button style="padding:6px 12px; font-size:0.7rem; background:var(--danger)" onclick="deleteWord('${d.id}')">Delete</button>`;
                div.appendChild(item);
            });
        }

        window.deleteWord = async (id) => {
            if(confirm("Permanently delete this word?")) {
                await deleteDoc(doc(db, "words", id));
                refreshAdminWords();
                fetchWords();
            }
        };

        document.getElementById('add-word-btn').addEventListener('click', async () => {
            const val = document.getElementById('new-word-input').value.trim().toLowerCase();
            
            if (val) {
                await addDoc(collection(db, "words"), { word: val });
                document.getElementById('new-word-input').value = "";
                refreshAdminWords();
                fetchWords();
            }
        });

        // --- LEADERBOARD ---
        function setupLeaderboard() {
            const q = query(collection(db, "users"), orderBy("points", "desc"), limit(5));
            onSnapshot(q, (snap) => {
                const body = document.getElementById('leaderboard-body');
                body.innerHTML = "";
                
                snap.forEach(u => {
                    const data = u.data();
                    body.innerHTML += `<tr><td>${u.id}${data.isAdmin ? ' ⭐' : ''}</td><td style="text-align:right; font-weight:900;">${data.points || 0}</td></tr>`;
                });
            });
        }

        // --- ADMIN ROLE CONTROL ---
        document.getElementById("make-admin-btn").addEventListener("click", async () => {
            const username = document.getElementById("admin-target").value.trim().toLowerCase();
            const password = document.getElementById("admin-password").value.trim();
            const msg = document.getElementById("admin-msg");
            if(!username) {
                msg.innerText = "Enter a username.";
                return;
            }
            if(!password) {
                msg.innerText = "Password required for admin.";
                return;
            }
            try{
                const userRef = doc(db, "users", username);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    await updateDoc(userRef, { isAdmin: true, password: password });
                } else {
                    await setDoc(userRef, { 
                        points: 0, 
                        unlockedThemes: ["bg-default"], 
                        isAdmin: true, 
                        password: password 
                    });
                }
                msg.innerText = username + " is now an Admin (password set).";
                msg.style.color = "var(--success)";
                document.getElementById("admin-password").value = "";
            } catch(e){
                msg.innerText = "Error: " + e.message;
                msg.style.color = "var(--danger)";
            }
        });

        document.getElementById("remove-admin-btn").addEventListener("click", async () => {
            const username = document.getElementById("admin-target").value.trim().toLowerCase();
            const msg = document.getElementById("admin-msg");
            if(!username) {
                msg.innerText = "Enter a username.";
                return;
            }
            try{
                await updateDoc(doc(db, "users", username), { isAdmin: false });
                msg.innerText = username + " is no longer an Admin.";
                msg.style.color = "var(--danger)";
            } catch(e){
                msg.innerText = "User not found.";
                msg.style.color = "var(--danger)";
            }
        });
    </script>
</body>
</html>
